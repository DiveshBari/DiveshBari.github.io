<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Menu</title>
<!-- Fonts are loaded dynamically from config -->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── ALL COLORS COME FROM CSS VARS SET BY CONFIG ─── */
  :root {
    --accent:       #C9A84C;
    --accent-light: #E8CC7A;
    --accent-dim:   #8B6F33;
    --bg:           #0A0A0A;
    --surface:      #111111;
    --surface2:     #181818;
    --surface3:     #222222;
    --border:       #1e1e1e;
    --text:         #F0EBE0;
    --text-muted:   #8A8070;
    --text-dim:     #4A4540;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body:    'Montserrat', sans-serif;
    --ease:         cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  #root { min-height: 100vh; }

  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent-dim); }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem 1rem;
    text-align: center;
  }
  .restaurant-name {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--accent);
    line-height: 1;
    text-transform: uppercase;
  }
  .restaurant-tagline {
    font-size: 10.5px;
    letter-spacing: 0.28em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
    font-family: var(--font-body);
  }
  .header-divider {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin: 10px auto 0;
  }

  /* ── CATEGORY TABS ── */
  .tabs-wrap {
    position: sticky; top: 89px; z-index: 90;
    background: color-mix(in srgb, var(--bg) 95%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    display: flex;
    overflow-x: auto;
    padding: 0 1rem;
    scrollbar-width: none;
    gap: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 1rem 1.25rem;
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.25s, border-color 0.25s;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .tab-icon { font-size: 14px; opacity: 0.5; transition: opacity 0.25s; }
  .tab:hover { color: var(--text-muted); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab.active .tab-icon { opacity: 1; }

  /* ── MENU CONTENT ── */
  .menu-content {
    padding: 2rem 1rem 5rem;
    max-width: 500px;
    margin: 0 auto;
  }
  .section-header { text-align: center; margin-bottom: 2rem; padding-top: 0.5rem; }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 8vw, 3.2rem);
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .section-ornament {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-top: 10px;
  }
  .ornament-line {
    width: 40px; height: 1px;
    background: linear-gradient(to right, transparent, var(--accent-dim));
  }
  .ornament-line.r { background: linear-gradient(to left, transparent, var(--accent-dim)); }
  .ornament-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    transform: rotate(45deg);
  }

  /* ── FOOD CARDS ── */
  .food-grid { display: flex; flex-direction: column; gap: 1px; }

  .food-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: stretch;
    transition: border-color 0.3s, transform 0.2s var(--ease);
    animation: reveal 0.5s var(--ease) both;
  }
  .food-card:active { transform: scale(0.99); }
  .food-card:hover { border-color: #2e2e2e; }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .food-card:nth-child(1) { animation-delay: 0.05s; }
  .food-card:nth-child(2) { animation-delay: 0.10s; }
  .food-card:nth-child(3) { animation-delay: 0.15s; }
  .food-card:nth-child(4) { animation-delay: 0.20s; }
  .food-card:nth-child(5) { animation-delay: 0.25s; }
  .food-card:nth-child(6) { animation-delay: 0.30s; }

  /* card image left layout */
  .card-img-wrap {
    width: 110px; min-width: 110px; height: 110px;
    position: relative; overflow: hidden; background: var(--surface2);
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s var(--ease);
    display: block;
  }
  .food-card:hover .card-img-wrap img { transform: scale(1.08); }

  .card-play {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.3s;
  }
  .food-card:hover .card-play { opacity: 1; }
  .play-ring {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .play-tri {
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid var(--accent);
    margin-left: 2px;
  }

  /* card body */
  .card-body {
    flex: 1; padding: 14px 16px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card-badges { display: flex; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
  .badge {
    font-size: 8px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 1px;
  }
  .badge-chef { background: linear-gradient(135deg, var(--accent-dim), var(--accent)); color: var(--bg); }
  .badge-veg  { background: transparent; border: 1px solid #2a4a2a; color: #5a9a5a; }
  .badge-spicy{ background: transparent; border: 1px solid #4a1a1a; color: #c05050; }

  .card-name {
    font-family: var(--font-display);
    font-size: 1.15rem; font-weight: 500;
    color: var(--text); line-height: 1.2;
    margin-bottom: 4px; letter-spacing: 0.01em;
  }
  .card-desc {
    font-size: 11px; color: color-mix(in srgb, var(--text) 78%, var(--text-muted));
    line-height: 1.5; letter-spacing: 0.02em; font-weight: 300;
  }
  .card-bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
  }
  .card-price {
    font-family: var(--font-display);
    font-size: 1.2rem; font-weight: 500;
    color: var(--accent); letter-spacing: 0.04em;
  }
  .card-cta { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0);
    display: flex; align-items: flex-end;
    transition: background 0.4s var(--ease);
  }
  .modal-overlay.open { background: rgba(0,0,0,0.92); }

  .modal-sheet {
    width: 100%; max-height: 95vh;
    background: var(--surface);
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    overflow: hidden;
    transform: translateY(100%);
    transition: transform 0.45s var(--ease);
    display: flex; flex-direction: column;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }

  /* video / visual area */
  .modal-media {
    position: relative; width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg); overflow: hidden; flex-shrink: 0;
  }
  .modal-media video,
  .modal-media .modal-image { width: 100%; height: 100%; object-fit: cover; display: block; }

  .media-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.5rem; position: relative; overflow: hidden;
  }
  .media-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 120% 80% at 50% 100%,
      color-mix(in srgb, var(--accent) 12%, transparent) 0%, transparent 70%);
  }
  .placeholder-emoji {
    font-size: 5rem; position: relative; z-index: 1;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .placeholder-info {
    position: relative; z-index: 1; text-align: center;
  }
  .placeholder-name {
    font-family: var(--font-display);
    font-size: 1.8rem; font-weight: 300; font-style: italic;
    color: var(--text); letter-spacing: 0.02em;
  }
  .placeholder-sub {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--accent-dim); margin-top: 6px; font-weight: 400;
  }

  /* loading */
  .media-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); z-index: 10;
  }
  .loading-ring {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1.5px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 20; line-height: 1; backdrop-filter: blur(8px);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .modal-close:hover {
    background: color-mix(in srgb, var(--accent) 20%, transparent);
    border-color: var(--accent); color: var(--accent);
  }

  /* modal body */
  .modal-body { padding: 1.5rem 1.5rem 2rem; overflow-y: auto; flex: 1; }
  .modal-handle { width: 36px; height: 3px; background: var(--surface3); border-radius: 2px; margin: 0 auto 1.5rem; }
  .modal-cat-label {
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--accent); font-weight: 400; margin-bottom: 8px;
  }
  .modal-name {
    font-family: var(--font-display);
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 300; color: var(--text);
    line-height: 1.1; margin-bottom: 8px; letter-spacing: 0.01em;
  }
  .modal-price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 1.25rem; }
  .modal-price { font-family: var(--font-display); font-size: 1.6rem; font-weight: 500; color: var(--accent); }
  .modal-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .modal-divider { height: 1px; background: linear-gradient(to right, var(--border), transparent); margin: 1.25rem 0; }
  .modal-desc {
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 400; color: var(--text-muted);
    line-height: 1.75; font-style: italic; margin-bottom: 1.5rem;
  }
  .modal-details {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem;
  }
  .detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 12px; border-radius: 2px;
  }
  .detail-label {
    font-size: 8.5px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 4px; font-weight: 400;
  }
  .detail-value { font-family: var(--font-display); font-size: 1rem; color: var(--text); font-weight: 400; }

  .modal-order-btn {
    width: 100%; padding: 1rem;
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: var(--font-body);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; border-radius: 2px;
    transition: background 0.25s, border-color 0.25s, color 0.25s;
  }
  .modal-order-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  /* ── FOOTER ── */
  .menu-footer { text-align: center; padding: 3rem 1.5rem 2rem; border-top: 1px solid var(--border); }
  .footer-text { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); line-height: 1.7; white-space: pre-line; }

</style>
</head>
<body>
<div id="root"></div>

<!-- Load config first, then React, then app -->
<script src="restaurant-config.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
// ── Apply theme CSS vars from config ───────────────────────────────
(function applyTheme(cfg) {
  const t = cfg.theme;
  const root = document.documentElement;
  root.style.setProperty('--accent',       t.colorAccent);
  root.style.setProperty('--accent-light', t.colorAccentLight);
  root.style.setProperty('--accent-dim',   t.colorAccentDim);
  root.style.setProperty('--bg',           t.colorBg);
  root.style.setProperty('--surface',      t.colorSurface);
  root.style.setProperty('--surface2',     t.colorSurface2);
  root.style.setProperty('--surface3',     t.colorSurface3);
  root.style.setProperty('--border',       t.colorBorder);
  root.style.setProperty('--text',         t.colorText);
  root.style.setProperty('--text-muted',   t.colorTextMuted);
  root.style.setProperty('--text-dim',     t.colorTextDim);

  // Load Google Fonts dynamically
  const fonts = [t.fontDisplay, t.fontBody].filter(Boolean);
  const unique = [...new Set(fonts)];
  const query = unique.map(f => `family=${encodeURIComponent(f)}:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400`).join('&');
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?${query}&display=swap`;
  document.head.appendChild(link);

  root.style.setProperty('--font-display', `'${t.fontDisplay}', Georgia, serif`);
  root.style.setProperty('--font-body',    `'${t.fontBody}', sans-serif`);

  document.title = cfg.name + ' — Menu';
})(RESTAURANT_CONFIG);

// ── Flatten all items with IDs ─────────────────────────────────────
const CATEGORIES = RESTAURANT_CONFIG.categories.map(c => c.name);
const ALL_ITEMS = {};
RESTAURANT_CONFIG.categories.forEach(cat => {
  ALL_ITEMS[cat.name] = cat.items.map((item, i) => ({
    ...item,
    id: cat.name + '-' + i,
    category: cat.name
  }));
});

// ── Shorthand ─────────────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;

// ── FoodCard ──────────────────────────────────────────────────────
function FoodCard({ item, onClick, index }) {
  return h('div', {
    className: 'food-card',
    onClick: () => onClick(item),
    role: 'button',
    'aria-label': `View ${item.name}`,
    style: { animationDelay: `${0.05 + index * 0.05}s` }
  },
    h('div', { className: 'card-img-wrap' },
      h('img', {
        src: item.image, alt: item.name, loading: 'lazy',
        onError: e => { e.target.style.opacity = '0'; }
      }),
      h('div', { className: 'card-play' },
        h('div', { className: 'play-ring' },
          h('div', { className: 'play-tri' })
        )
      )
    ),
    h('div', { className: 'card-body' },
      h('div', null,
        h('div', { className: 'card-badges' },
          item.chefRec && h('span', { className: 'badge badge-chef' }, "Chef's pick"),
          item.veg     && h('span', { className: 'badge badge-veg'  }, "Vegetarian"),
          item.spicy   && h('span', { className: 'badge badge-spicy'}, "Spicy")
        ),
        h('div', { className: 'card-name' }, item.name),
        h('div', { className: 'card-desc' }, item.description)
      ),
      h('div', { className: 'card-bottom' },
        h('div', { className: 'card-price' }, item.price),
        h('div', { className: 'card-cta' }, 'View →')
      )
    )
  );
}

// ── FoodModal ─────────────────────────────────────────────────────
function FoodModal({ item, onClose }) {
  const [open,    setOpen]    = useState(false);
  const [loading, setLoading] = useState(true);
  const [mediaError, setMediaError] = useState(false);
  const overlayRef = useRef(null);
  const videoRef   = useRef(null);

  useEffect(() => {
    if (item) {
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(() => setOpen(true));
      setLoading(true);
      setMediaError(false);
      if (!item.video && !item.modalImage) {
        const t = setTimeout(() => setLoading(false), 250);
        return () => clearTimeout(t);
      }
    } else {
      document.body.style.overflow = '';
      setOpen(false);
      setLoading(true);
    }
  }, [item]);

  const close = useCallback(() => {
    setOpen(false);
    setTimeout(onClose, 450);
  }, [onClose]);

  if (!item) return null;

  const hasVideo = !!item.video;
  const hasModalImage = !!item.modalImage && !mediaError;
  const sub = [item.origin, item.category].filter(Boolean).join(' · ');
  const det = item.details || {};

  return h('div', {
    ref: overlayRef,
    className: `modal-overlay${open ? ' open' : ''}`,
    onClick: e => { if (e.target === overlayRef.current) close(); },
    role: 'dialog', 'aria-modal': 'true', 'aria-label': item.name
  },
    h('div', { className: 'modal-sheet' },

      // MEDIA
      h('div', { className: 'modal-media' },
        hasVideo
          ? h('video', {
              ref: videoRef,
              src: item.video,
              autoPlay: true, loop: true, muted: true, playsInline: true,
              onCanPlay: () => setLoading(false),
              onError: () => { setMediaError(true); setLoading(false); }
            })
          : hasModalImage
            ? h('img', {
                className: 'modal-image',
                src: item.modalImage,
                alt: item.name,
                onLoad: () => setLoading(false),
                onError: () => { setMediaError(true); setLoading(false); }
              })
            : h('div', { className: 'media-placeholder' },
                h('div', { className: 'placeholder-emoji' }, item.emoji || '🍽️'),
                h('div', { className: 'placeholder-info' },
                  h('div', { className: 'placeholder-name' }, item.name),
                  sub && h('div', { className: 'placeholder-sub' }, sub)
                )
              ),
        loading && h('div', { className: 'media-loading' },
          h('div', { className: 'loading-ring' })
        ),
        h('button', { className: 'modal-close', onClick: close, 'aria-label': 'Close' }, '×')
      ),

      // BODY
      h('div', { className: 'modal-body' },
        h('div', { className: 'modal-handle' }),
        h('div', { className: 'modal-cat-label' }, item.category),
        h('h2', { className: 'modal-name' }, item.name),
        h('div', { className: 'modal-price-row' },
          h('span', { className: 'modal-price' }, item.price),
          h('div', { className: 'modal-badges' },
            item.chefRec && h('span', { className: 'badge badge-chef' }, "Chef's pick"),
            item.veg     && h('span', { className: 'badge badge-veg'  }, "Vegetarian"),
            item.spicy   && h('span', { className: 'badge badge-spicy'}, "Spicy")
          )
        ),
        h('div', { className: 'modal-divider' }),
        h('p', { className: 'modal-desc' }, item.description),

        (det.calories || det.prep || det.pairing || item.allergens) &&
        h('div', { className: 'modal-details' },
          det.calories && h('div', { className: 'detail-item' },
            h('div', { className: 'detail-label' }, 'Calories'),
            h('div', { className: 'detail-value' }, det.calories)
          ),
          det.prep && h('div', { className: 'detail-item' },
            h('div', { className: 'detail-label' }, 'Preparation'),
            h('div', { className: 'detail-value' }, det.prep)
          ),
          det.pairing && h('div', { className: 'detail-item' },
            h('div', { className: 'detail-label' }, 'Wine Pairing'),
            h('div', { className: 'detail-value' }, det.pairing)
          ),
          item.allergens && h('div', { className: 'detail-item' },
            h('div', { className: 'detail-label' }, 'Allergens'),
            h('div', { className: 'detail-value' }, item.allergens)
          )
        ),

        h('div', { className: 'modal-divider' }),
        h('button', {
          className: 'modal-order-btn',
          onClick: close
        }, 'Return to Menu')
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────────
function App() {
  const cfg = RESTAURANT_CONFIG;
  const [activeTab,     setActiveTab]     = useState(CATEGORIES[0]);
  const [selectedItem,  setSelectedItem]  = useState(null);

  const icons = cfg.theme.tabIcons || [];
  const items = ALL_ITEMS[activeTab] || [];

  return h(React.Fragment, null,

    // HEADER
    h('header', { className: 'app-header' },
      h('div', { className: 'restaurant-name' }, cfg.name),
      cfg.tagline && h('p', { className: 'restaurant-tagline' }, cfg.tagline),
      h('div', { className: 'header-divider' })
    ),

    // TABS
    h('div', { className: 'tabs-wrap' },
      h('nav', { className: 'tabs', role: 'tablist' },
        CATEGORIES.map((cat, i) =>
          h('button', {
            key: cat,
            className: `tab${activeTab === cat ? ' active' : ''}`,
            onClick: () => setActiveTab(cat),
            role: 'tab',
            'aria-selected': activeTab === cat
          },
            icons[i] && h('span', { className: 'tab-icon' }, icons[i]),
            cat
          )
        )
      )
    ),

    // MENU
    h('main', { className: 'menu-content' },
      h('div', { className: 'section-header' },
        h('h2', { className: 'section-title' }, activeTab),
        h('div', { className: 'section-ornament' },
          h('div', { className: 'ornament-line' }),
          h('div', { className: 'ornament-dot' }),
          h('div', { className: 'ornament-line r' })
        )
      ),
      h('div', { className: 'food-grid' },
        items.map((item, i) =>
          h(FoodCard, { key: item.id, item, onClick: setSelectedItem, index: i })
        )
      ),

      h('footer', { className: 'menu-footer' },
        h('p', { className: 'footer-text' }, cfg.footerNote || ''),
        h('div', { className: 'header-divider', style: { margin: '1rem auto' } }),
        h('p', { className: 'footer-text', style: { opacity: 0.3 } }, cfg.name + ' · ' + new Date().getFullYear())
      )
    ),

    // MODAL
    h(FoodModal, {
      item: selectedItem,
      onClose: () => setSelectedItem(null)
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
